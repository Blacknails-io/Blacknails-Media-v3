<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blacknails Media v3 - Logo Preview</title>
    <style>
        body {
            background-color: #050711;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }
        .container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .logo-box {
            background: #111424;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        img {
            max-width: 400px;
            height: auto;
            margin-bottom: 20px;
        }
        h2 { font-size: 1.2rem; margin: 0; color: #a1a1aa; }
    </style>
</head>
<body>
    <h1>Blacknails Media v3</h1>
    <div class="container">
        <div class="logo-box">
            <img src="../client/public/brand/logos/source/blacknails-media-v3-source.svg" alt="Logo Original Vectorizado" />
            <h2>1. Diseño Original Vectorizado</h2>
        </div>
        <div class="logo-box">
            <img src="../client/public/brand/logos-alt/source/blacknails-media-v3-alt-source.svg" alt="Propuesta Alternativa Geométrica" />
            <h2>2. Variante Geométrica Abstracta</h2>
        </div>
    </div>
</body>
</html>
